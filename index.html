<!doctype html>
<html lang="de" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Kolpingtheater Ramsen · Jubiläums-Slideshow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Geist:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --k300: #ffb05a;
        --k400: #ff7a00;
        --k500: #ff6a00;
        --s950: #0a0a0a;
        --s900: #0f0f10;
        --s800: #18181a;
        --s700: #232326;
        --s300: #8a8a8e;
        --s100: #e6e6e6;
        --s50: #f3f3f3;
        --fdisp: 'Cinzel', ui-serif, Georgia, 'Times New Roman', serif;
        --fsans: 'Geist', ui-sans-serif, system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body {
        height: 100%;
        margin: 0;
        background: var(--s950);
        color: var(--s50);
        font-family: var(--fsans);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      ::selection { background: var(--k500); color: #fff; }

      .stage {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background: var(--s950);
        cursor: default;
      }

      /* image plates (crossfade) live in their own stacking context */
      .plates { position: absolute; inset: 0; z-index: 1; }
      .plate {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .plate img { position: absolute; inset: 0; width: 100%; height: 100%; }
      .plate .bg {
        object-fit: cover;
        filter: blur(60px) brightness(0.4);
        animation: bgzoom var(--kb, 16s) ease-in-out forwards;
        transform: scale(1.25);
      }
      .plate .fg { object-fit: contain; }
      .plate .blank { position: absolute; inset: 0; background: var(--s950); }
      .plate .tint { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.1); }
      .plate .vignette {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(120% 120% at 50% 42%, rgba(0, 0, 0, 0) 45%, rgba(0, 0, 0, 0.6) 92%);
      }

      /* cinematic decoration */
      .spotlight {
        position: absolute;
        inset: -10% -5% -5% -5%;
        z-index: 2;
        pointer-events: none;
        background:
          radial-gradient(60% 50% at 50% 8%, rgba(255, 200, 140, 0.12), rgba(0, 0, 0, 0) 60%),
          radial-gradient(80% 80% at 28% 18%, rgba(255, 120, 0, 0.08), rgba(0, 0, 0, 0) 70%),
          radial-gradient(80% 80% at 72% 18%, rgba(255, 120, 0, 0.08), rgba(0, 0, 0, 0) 70%);
        mix-blend-mode: screen;
      }
      .footlight {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 240px;
        z-index: 2;
        pointer-events: none;
        background:
          radial-gradient(120% 100% at 50% 100%, rgba(255, 122, 0, 0.16), transparent 60%),
          linear-gradient(to top, rgba(10, 6, 2, 0.85), transparent);
      }
      .scanlines {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        opacity: 0.1;
        background-image: repeating-linear-gradient(
          to bottom, rgba(0, 0, 0, 0) 0, rgba(0, 0, 0, 0) 2px,
          rgba(0, 0, 0, 0.18) 3px, rgba(0, 0, 0, 0) 4px);
        mix-blend-mode: multiply;
      }
      /* dip-to-black layer for chapter / theme-change transitions */
      .flash {
        position: absolute;
        inset: 0;
        z-index: 9;
        background: #000;
        opacity: 0;
        pointer-events: none;
        will-change: opacity;
      }
      .grain::after {
        content: '';
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter><rect width="140" height="140" filter="url(%23n)" opacity="0.06"/></svg>');
        background-size: 140px 140px;
        opacity: 0.12;
      }
      .tick {
        position: absolute;
        width: 14px;
        height: 14px;
        z-index: 4;
        pointer-events: none;
        border-color: rgba(255, 122, 0, 0.65);
      }
      .tick.tl { top: 16px; left: 16px; border-left: 2px solid; border-top: 2px solid; }
      .tick.tr { top: 16px; right: 16px; border-right: 2px solid; border-top: 2px solid; }
      .tick.bl { bottom: 16px; left: 16px; border-bottom: 2px solid; border-left: 2px solid; }
      .tick.br { bottom: 16px; right: 16px; border-bottom: 2px solid; border-right: 2px solid; }

      /* overlay layer (intro / cover / now-label) */
      .overlay { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

      .topbar {
        position: absolute;
        top: 18px;
        left: 18px;
        right: 18px;
        z-index: 12;
        width: auto;
        display: grid;
        grid-template-columns: minmax(340px, 500px) 1fr;
        gap: 22px;
        align-items: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.45s ease;
      }
      .topbar.on { opacity: 1; }
      .topbar.on .top-current {
        position: fixed;
        left: 48px;
        bottom: 92px;
        width: min(500px, calc(100vw - 96px));
      }
      .top-current {
        min-width: 0;
        padding: 14px 18px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(10,10,10,0.56);
        backdrop-filter: blur(12px);
        box-shadow: 0 12px 30px rgba(0,0,0,0.22);
      }
      .top-current .eyebrow {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--k400);
        white-space: nowrap;
      }
      .top-current .title {
        margin-top: 4px;
        font-family: var(--fdisp);
        font-size: clamp(1rem, 2vw, 1.45rem);
        font-weight: 900;
        line-height: 1;
        text-transform: uppercase;
        text-shadow: 0 2px 6px rgba(0,0,0,0.7);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .top-current .desc {
        margin-top: 8px;
        color: rgba(255,255,255,0.76);
        font-size: 13px;
        line-height: 1.4;
        text-shadow: 0 2px 6px rgba(0,0,0,0.7);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .timeline {
        position: relative;
        display: grid;
        grid-template-columns: repeat(var(--items), minmax(0, 1fr));
        align-items: start;
        gap: 0;
        min-width: 0;
        padding-top: 3px;
      }
      .timeline::before {
        content: '';
        position: absolute;
        left: calc(100% / var(--items) / 2);
        right: calc(100% / var(--items) / 2);
        top: 8px;
        height: 1px;
        background: rgba(255,255,255,0.28);
      }
      .tl-item {
        position: relative;
        display: grid;
        justify-items: center;
        gap: 6px;
        min-width: 0;
        color: rgba(255,255,255,0.58);
      }
      .tl-dot {
        width: 10px;
        height: 10px;
        border-radius: 9999px;
        border: 1px solid rgba(255,255,255,0.45);
        background: rgba(10,10,10,0.82);
        box-shadow: 0 0 0 4px rgba(10,10,10,0.5);
      }
      .tl-item.done .tl-dot { border-color: rgba(255,122,0,0.65); background: rgba(255,122,0,0.55); }
      .tl-item.active { color: #fff; }
      .tl-item.active .tl-dot {
        width: 16px;
        height: 16px;
        margin-top: -3px;
        border-color: var(--k300);
        background: var(--k400);
        box-shadow: 0 0 0 5px rgba(255,122,0,0.18), 0 0 22px rgba(255,122,0,0.55);
      }
      .tl-year {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 2px 6px rgba(0,0,0,0.9);
      }
      .tl-name {
        max-width: 92px;
        font-size: 10px;
        line-height: 1.1;
        text-align: center;
        text-shadow: 0 2px 6px rgba(0,0,0,0.9);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      @media (max-width: 760px) {
        .topbar {
          top: 14px;
          left: 14px;
          right: 14px;
          width: calc(100vw - 28px);
          grid-template-columns: 1fr;
          gap: 10px;
        }
        .topbar.on .top-current {
          left: 24px;
          bottom: 76px;
          width: calc(100vw - 48px);
        }
        .top-current { padding: 8px 10px; }
        .timeline { overflow: hidden; }
        .tl-name { display: none; }
      }

      .intro {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 24px; text-align: center;
      }
      .intro .kicker {
        font-size: 12px; letter-spacing: 0.45em; text-transform: uppercase; color: var(--k400);
        animation: letterbreathe 1.5s cubic-bezier(0.22,1,0.36,1) both;
      }
      .intro h1 {
        margin: 24px 0 0;
        font-family: var(--fdisp);
        font-weight: 900;
        font-size: clamp(3rem, 12vw, 9rem);
        line-height: 0.9;
        text-shadow: 0 4px 12px rgba(0, 0, 0, 0.8);
        animation: curtainrise 1.1s cubic-bezier(0.22,1,0.36,1) both;
      }
      .intro h1 em { font-style: italic; color: var(--k400); }
      .intro .hair {
        margin: 32px 0; height: 1px; width: 190px;
        background: linear-gradient(90deg, transparent, rgba(255, 180, 100, 0.9), transparent);
      }
      .intro p {
        margin: 0; max-width: 36rem; font-size: clamp(0.9rem, 2vw, 1.15rem); color: rgba(230,230,230,0.9);
        text-shadow: 0 2px 6px rgba(0,0,0,0.7); animation: fadeup 0.7s cubic-bezier(0.22,1,0.36,1) both;
      }
      .intro .hint {
        margin-top: 40px; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--s300);
        animation: fadeup 0.7s 0.2s cubic-bezier(0.22,1,0.36,1) both;
      }

      /* cover slide */
      .cov { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; }
      .cov .grad { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.3) 45%, transparent); }
      .cov .inner { position: relative; padding: 24px 48px 88px; }
      @media (min-width: 640px) { .cov .inner { padding: 24px 48px 96px; } }
      .cov .tags { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; animation: fadeup 0.7s cubic-bezier(0.22,1,0.36,1) both; }
      .badge {
        display: inline-flex; align-items: center; gap: 8px; border-radius: 9999px;
        padding: 6px 14px; font-size: 11px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase;
        backdrop-filter: blur(6px);
      }
      .badge.pause { border: 1px solid rgba(255,122,0,0.5); background: rgba(10,10,10,0.7); color: var(--k400); }
      .badge.pause .dot { width: 6px; height: 6px; border-radius: 9999px; background: var(--k400); animation: pulsedot 2s ease-in-out infinite; }
      .badge.loc { border: 1px solid rgba(255,255,255,0.2); background: rgba(10,10,10,0.55); color: #fff; }
      .cov .year { font-family: var(--fdisp); font-style: italic; font-size: 1.75rem; color: var(--k300); font-variant-numeric: tabular-nums; text-shadow: 0 2px 6px rgba(0,0,0,0.7); }
      .cov h2, .now h2 {
        margin: 16px 0 0; font-family: var(--fdisp); font-weight: 900; text-transform: uppercase;
        line-height: 0.9; letter-spacing: -0.01em; text-shadow: 0 4px 12px rgba(0,0,0,0.8);
      }
      .cov h2 { font-size: clamp(2.5rem, 8vw, 6rem); animation: curtainrise 1.1s cubic-bezier(0.22,1,0.36,1) both; }
      .cov .sub { margin-top: 8px; font-family: var(--fdisp); font-style: italic; font-size: clamp(1.1rem, 3vw, 1.7rem); color: var(--k300); }
      .cov .blurb { margin: 16px 0 0; max-width: 42rem; font-size: clamp(0.9rem, 2vw, 1.15rem); color: rgba(230,230,230,0.9); text-shadow: 0 2px 6px rgba(0,0,0,0.7); animation: fadeup 0.7s cubic-bezier(0.22,1,0.36,1) both; }
      .cov .meta { margin-top: 20px; display: flex; align-items: center; gap: 12px; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.8); }
      .cov .meta .ln { height: 1px; width: 40px; background: var(--k400); }

      /* persistent now-label (photo slides), bottom-left, large */
      .now {
        position: absolute; left: 24px; right: 24px; bottom: 84px;
      }
      @media (min-width: 640px) { .now { left: 48px; right: auto; bottom: 100px; max-width: 42rem; } }
      .now .tags { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; animation: fadeup 0.6s cubic-bezier(0.22,1,0.36,1) both; }
      .now .kicker { font-size: 11px; font-weight: 600; letter-spacing: 0.35em; text-transform: uppercase; color: var(--k400); }
      .now .ln { height: 1px; width: 32px; background: rgba(255,122,0,0.6); }
      .now .count { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.7); font-variant-numeric: tabular-nums; }
      .now h2 { margin-top: 4px; font-size: clamp(2rem, 6vw, 4rem); }
      .now .blurb { margin: 8px 0 0; max-width: 40rem; font-size: clamp(0.8rem, 1.8vw, 1.05rem); color: rgba(230,230,230,0.85); text-shadow: 0 2px 6px rgba(0,0,0,0.7); animation: fadeup 0.6s 0.05s cubic-bezier(0.22,1,0.36,1) both; }

      /* HUD */
      .hud {
        position: absolute; left: 0; right: 0; bottom: 0; z-index: 20;
        transition: opacity 0.5s ease;
      }
      .progress { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--s800); }
      .progress .bar { height: 100%; width: 0; background: linear-gradient(to right, var(--k500), var(--k300)); transition: width 0.3s linear; }
      .controls {
        display: flex; align-items: center; justify-content: flex-end; gap: 12px;
        padding: 24px 32px 16px;
      }
      .counter { margin-right: auto; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--s300); font-variant-numeric: tabular-nums; }
      .btn {
        width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center;
        border-radius: 9999px; border: 1px solid rgba(255,255,255,0.08); background: rgba(15,15,16,0.62);
        backdrop-filter: blur(10px); color: var(--s50); font-size: 14px; cursor: pointer; transition: color 0.2s;
      }
      .btn:hover { color: var(--k400); }
      .btn.wide { width: 48px; }

      /* animations */
      @keyframes bgzoom { from { transform: scale(1.25); } to { transform: scale(1.34) translate3d(0, -2%, 0); } }
      @keyframes fadeup { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes curtainrise { from { clip-path: inset(100% 0 0 0); opacity: 0; } to { clip-path: inset(0 0 0 0); opacity: 1; } }
      @keyframes letterbreathe { from { letter-spacing: 0.02em; opacity: 0; } to { letter-spacing: 0.45em; opacity: 1; } }
      @keyframes pulsedot { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .plate .bg, .intro h1, .intro .kicker, .intro p, .intro .hint, .cov h2, .cov .blurb, .cov .tags, .now .tags, .now .blurb {
          animation: none !important; opacity: 1 !important; clip-path: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="stage" class="stage grain">
      <div class="plates">
        <div id="plate0" class="plate"></div>
        <div id="plate1" class="plate"></div>
      </div>
      <div class="spotlight"></div>
      <div class="footlight"></div>
      <div class="scanlines"></div>
      <div id="flash" class="flash"></div>
      <span class="tick tl"></span><span class="tick tr"></span>
      <span class="tick bl"></span><span class="tick br"></span>
      <div id="topbar" class="topbar"></div>
      <div id="overlay" class="overlay"></div>
      <div id="hud" class="hud">
        <div class="progress"><div id="bar" class="bar"></div></div>
        <div class="controls">
          <span id="counter" class="counter"></span>
          <button id="prev" class="btn" title="Zurück (←)" aria-label="Zurück">‹</button>
          <button id="play" class="btn wide" title="Play/Pause (Leertaste)" aria-label="Play/Pause">❚❚</button>
          <button id="next" class="btn" title="Weiter (→)" aria-label="Weiter">›</button>
          <button id="fs" class="btn wide" title="Vollbild (F)" aria-label="Vollbild">⛶</button>
        </div>
      </div>
    </div>

    <script>
      /* ════════ CONFIG ════════ */
      const SHOW = {
        title: 'Kolpingtheater Ramsen',
        kicker: 'Jubiläum · Eine Reise durch unsere Produktionen',
        subtitle: '2014 – 2026 · 12 Jahre Leidenschaft auf der Bühne',
      };
      const PLAY_ORDER = 'asc';
      const TIMING = { intro: 7000, cover: 6000, photo: 4500, teamCover: 5000, teamPhoto: 3500 };
      const LOCATION_LABELS = {
        'verrat-im-kloster': 'Open-Air-Bühne', bluttribut: 'Open-Air-Bühne',
        dystopia: 'Open-Air-Bühne', kristall: 'Open-Air-Bühne', maleficarum: 'Open-Air-Bühne',
        goldfieber: 'Open-Air-Bühne', freiheit: 'Open-Air-Bühne', nexus: 'Open-Air-Bühne', anno: 'Open-Air-Bühne',
      };
      const PLAY_BLURB = {
        'verrat-im-kloster': 'Die erste Open-Air-Produktion auf der Kolpingwiese: ein historisch inspirierter Königsmord im Schatten des Klosters Ramosa.',
        bluttribut: 'Vampire brachten Gruselstimmung auf die Bühne, immer wieder aufgelockert durch komische Szenen und finstere Überraschungen.',
        dystopia: 'Rauchschwaden über der Kolpingwiese entführten in eine düstere Zukunftsvision, in der die paramilitärischen Snakes die Stadt beherrschen.',
        kristall: 'Mitten in bewegten Zeiten tauchten die Zuschauer in ein Märchenreich ein und begleiteten Prinzessin Merle auf der Suche nach ihrer Bestimmung.',
        maleficarum: 'Das dunkle Mittelalter kehrte zurück ins Kloster Ramosa — eine packende Geschichte rund um Hexenwahn, Religion und Widerstand.',
        goldfieber: 'Eine unterhaltsame Cowboykomödie: Goldgier, Revolverhelden und jede Menge Schabernack auf der Kolpingwiese.',
        freiheit: 'Eine packende Geschichte über Piraten, Freiheit und Freundschaft — mit Salzwasser auf den Lippen und Wind in den Segeln.',
        nexus: 'Eine Geschichte in einer nicht mehr allzu fernen dystopischen Zukunft, in der alles miteinander verbunden — und doch bedroht ist.',
        anno: '„Anno 1146 – Alles hat eine Geschichte": Unser großes Sommerstück über die Wurzeln des Klosters Ramosa.',
      };
      const TEAM_BLURB = {
        'hinter-den-kulissen': 'Ein Blick auf Proben, Aufbau und all die Momente, in denen aus vielen helfenden Händen Theater entsteht.',
        kreativbuehne: 'Unsere kleinere Winteraufführung in besonderem Rahmen, nah am Publikum und mit eigenen Geschichten.',
        praesentation: 'Bilder von unseren Schauspielern und ihren Rollen.',
      };
      const TIMELINE_TEASERS = [
        { slug: 'creepshow', title: 'Creepshow', year: 2026, order: 8 },

      const plays = ALBUMS.filter((a) => a.kind === 'play');
      const teams = ALBUMS.filter((a) => a.kind === 'team');
      const dir = PLAY_ORDER === 'desc' ? -1 : 1;
      const ordered = [...plays].sort((a, b) => dir * ((a.order || 0) - (b.order || 0)));
      const timelineItems = [...ordered, ...TIMELINE_TEASERS].sort((a, b) => dir * ((a.order || 0) - (b.order || 0)));
      const segments = [];
      let tc = 0;
      for (let i = 0; i < ordered.length; i++) {
        segments.push(ordered[i]);
        if (i < ordered.length - 1 && teams.length) {
          segments.push(teams[tc % teams.length]);
          tc++;
        }
      }
      const SEQ = [{ type: 'intro' }];
      for (const album of segments) {
        SEQ.push({ type: 'cover', album });
        for (let i = 0; i < album.assets.length; i++) {
          SEQ.push({ type: 'photo', album, asset: album.assets[i], index: i });
        }
      }

      const imgUrl = (album, id) => 'photos/' + album.slug + '/' + id + '.jpg';
      const slideImg = (s) =>
        s.type === 'intro' ? null : s.type === 'cover' ? imgUrl(s.album, s.album.coverId) : imgUrl(s.album, s.asset);
      const dur = (s) =>
        s.type === 'intro' ? TIMING.intro
        : s.type === 'cover' ? (s.album.kind === 'team' ? TIMING.teamCover : TIMING.cover)
        : (s.album.kind === 'team' ? TIMING.teamPhoto : TIMING.photo);

      const $ = (id) => document.getElementById(id);
      const plates = [$('plate0'), $('plate1')];
      const topbar = $('topbar');
      const overlay = $('overlay');

      const hud = $('hud');
      const playBtn = $('play');
      const flash = $('flash');
      const EASE = 'cubic-bezier(0.22, 1, 0.36, 1)';

      /* Transition weight between two slides:
       *   big   = theme/section change (different album, or intro)  -> dip-to-black
       *   small = cover -> first photo (hero settling into content) -> quick dissolve
       *   medium= photo -> photo within the same album              -> crossfade */
      function transitionType(outS, inS) {
        const outA = outS.type === 'intro' ? null : outS.album;
        const inA = inS.type === 'intro' ? null : inS.album;
        if (!outA || !inA || outA.slug !== inA.slug) return 'big';
        if (outS.type === 'cover' && inS.type === 'photo') return 'small';

      let playing = true;
      let timer = null;

      const cache = new Set();

      function plateHtml(s) {
        const url = slideImg(s);

        return (
          '<img class="bg" src="' + url + '" alt="" aria-hidden="true" style="--kb:' + dur(s) + 'ms">' +
          '<img class="fg" src="' + url + '" alt="">' +
          '<div class="tint"></div><div class="vignette"></div>'
        );
      }

      function preload(from) {
        for (let off = 0; off <= 4; off++) {
          const i = (from + off) % SEQ.length;
          const url = slideImg(SEQ[i]);
          if (!url || cache.has(url)) continue;
          cache.add(url);
          const im = new Image();
          im.onload = () => loaded.add(url);
          im.src = url;
        }

      function activate(n) {
        const outS = SEQ[idx];
        const inS = SEQ[n];

        const inactive = 1 - active;

        function reveal() {
          p.innerHTML = plateHtml(inS);

          // Soft dip, swap near the peak, then let the new chapter breathe in.
          flash.style.transition = 'opacity 0.55s ' + EASE;
          flash.style.opacity = '0.88';
          setTimeout(() => {
            reveal();
            requestAnimationFrame(() => {
              flash.style.transition = 'opacity 1.1s ' + EASE;
              flash.style.opacity = '0';
            });
          }, 520);
        } else {
          reveal();
        }
      }

      function show(target) {
        const n = ((target % SEQ.length) + SEQ.length) % SEQ.length;
        if (n === idx) return;
        const url = slideImg(SEQ[n]);
        if (url && !loaded.has(url)) { setTimeout(() => show(n), 250); return; }
        activate(n);
      }

      function schedule() {
        clearTimeout(timer);
        if (playing) timer = setTimeout(() => show(idx + 1), dur(SEQ[idx]));
      }

      function updateOverlay() {
        const s = SEQ[idx];
        updateTopbar(s);
        overlay.innerHTML = s.type === 'intro' ? introHtml() : '';
      }

      function currentPlay(s) {
        if (s.type === 'intro') return null;
        if (s.album.kind === 'play') return s.album;
        for (let i = idx - 1; i >= 0; i--) {
          const prev = SEQ[i];
          if (prev.album && prev.album.kind === 'play') return prev.album;
        }
        return ordered[0] || null;
      }

      function updateTopbar(s) {
        if (s.type === 'intro') {
          topbar.className = 'topbar';
          topbar.innerHTML = '';
          return;
        }

        const a = s.album;
        const play = currentPlay(s);
        const activeOrder = play ? play.order : -Infinity;
        const eyebrow = a.kind === 'team'
          ? (a.subtitle || 'Ensemble')
          : (a.year ? a.year + ' · Stück' : 'Stück');
        const desc = a.kind === 'team'
          ? (TEAM_BLURB[a.slug] || '')
          : (PLAY_BLURB[a.playSlug] || '');
        const items = timelineItems.map((p) => {
          const state = p.slug === play?.slug ? ' active' : (p.order < activeOrder ? ' done' : '');
          return (
            '<div class="tl-item' + state + '">' +
              '<span class="tl-dot"></span>' +
              '<span class="tl-year">' + p.year + '</span>' +
              '<span class="tl-name">' + p.title + '</span>' +
            '</div>'
          );
        }).join('');

        topbar.className = 'topbar on';
        topbar.innerHTML = (
          '<div class="top-current">' +
            '<div class="eyebrow">' + eyebrow + '</div>' +
            '<div class="title">' + a.title + '</div>' +
            (desc ? '<div class="desc">' + desc + '</div>' : '') +
          '</div>' +
          '<div class="timeline" style="--items:' + timelineItems.length + '">' + items + '</div>'
        );
      }

      function updateHud() {
        bar.style.width = (SEQ.length > 1 ? (idx / (SEQ.length - 1)) * 100 : 0) + '%';
        counter.textContent = 'Bild ' + (idx + 1) + ' / ' + SEQ.length;
      }

      function introHtml() {
        return (
          '<div class="intro">' +
            '<div class="kicker">' + SHOW.kicker + '</div>' +
            '<h1>Kolpingtheater<br><em>Ramsen</em></h1>' +
            '<div class="hair"></div>' +
            '<p>' + SHOW.subtitle + '</p>' +
            '<div class="hint">Ein Diaprojektor beginnt gleich …</div>' +
          '</div>'
        );
      }

      function coverHtml(s) {
        const a = s.album;
        const isTeam = a.kind === 'team';
        const tag = isTeam
          ? '<span class="badge pause"><span class="dot"></span>' + (a.subtitle || 'Ensemble') + '</span>'
          : '<span class="badge loc">' + (LOCATION_LABELS[a.playSlug] || 'Produktion') + '</span>' +
            (a.year ? '<span class="year">' + a.year + '</span>' : '');
        const sub = a.subtitle ? '<div class="sub">' + a.subtitle + '</div>' : '';
        return (
          '<div class="cov"><div class="grad"></div><div class="inner">' +
            '<div class="tags">' + tag + '</div>' +
            '<h2>' + a.title + '</h2>' + sub +
            '<div class="meta"><span class="ln"></span>' + a.assets.length + ' Bilder</div>' +
          '</div></div>'
        );
      }

      function nowHtml(s) {
        const a = s.album;
        const isTeam = a.kind === 'team';
        const kicker = isTeam ? (a.subtitle || 'Ensemble') : (a.year ? String(a.year) : 'Produktion');
        return (
          '<div class="now">' +
            '<div class="tags"><span class="kicker">' + kicker + '</span><span class="ln"></span>' +
              '<span class="count">' + (s.index + 1) + ' / ' + a.assets.length + '</span></div>' +
            '<h2>' + a.title + '</h2>' +
          '</div>'
        );
      }

      /* controls */
      function togglePlay() { playing = !playing; playBtn.textContent = playing ? '❚❚' : '►'; schedule(); }
      function toggleFs() {
        if (document.fullscreenElement) document.exitFullscreen();
        else document.documentElement.requestFullscreen();
      }
      $('prev').addEventListener('click', (e) => { e.stopPropagation(); show(idx - 1); });
      $('next').addEventListener('click', (e) => { e.stopPropagation(); show(idx + 1); });
      playBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
      $('fs').addEventListener('click', (e) => { e.stopPropagation(); toggleFs(); });

      function pokeHud() {
        hud.style.opacity = '1';
        clearTimeout(hudTimer);
        hudTimer = setTimeout(() => { hud.style.opacity = '0'; }, 3500);
      }

      document.addEventListener('keydown', (e) => {
        pokeHud();
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') show(idx + 1);
        else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') show(idx - 1);
        else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
        else if (e.key === 'f' || e.key === 'F') toggleFs();
      });
      document.addEventListener('mousemove', pokeHud);
      document.addEventListener('click', pokeHud);

      /* boot */
      plates[0].innerHTML = plateHtml(SEQ[0]);
      plates[0].style.opacity = '1';
      plates[0].style.zIndex = '1';
      active = 0;
      updateOverlay();
      updateHud();
      preload(0);
      schedule();
      pokeHud();
    </script>
  </body>
</html>
